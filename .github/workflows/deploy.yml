name: deployment
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - run: cargo install mdbook
      - name: Install print PDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            texlive-fonts-recommended \
            fonts-jetbrains-mono \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-symbola
      - name: Install print PDF fonts (zh-tw)
        working-directory: zh-tw
        run: |
          mkdir -p print/fonts
          curl -L --fail --retry 3 --retry-delay 2 \
            --output print/fonts/NotoSansCJKtc-Regular.otf \
            https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf
          curl -L --fail --retry 3 --retry-delay 2 \
            --output print/fonts/NotoSansCJKtc-Bold.otf \
            https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Bold.otf
          curl -L --fail --retry 3 --retry-delay 2 \
            --output print/fonts/NotoSansMonoCJKtc-Regular.otf \
            https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/Mono/NotoSansMonoCJKtc-Regular.otf
      - name: Build zh-tw book
        working-directory: zh-tw
        run: |
          mdbook test
          mdbook build
      - name: Build and publish print PDF (zh-tw)
        working-directory: zh-tw
        run: |
          bash ./print/build.sh
          cp book/rust-book-a4.pdf book/book.pdf
      - name: Bundle zh-tw/src as rust-book-src.zip for AI consumption
        working-directory: zh-tw
        run: (cd src && zip -r ../book/rust-book-src.zip .)
      - name: Assemble multi-language site
        run: |
          rm -rf public
          mkdir -p public
          cp index.html public/index.html
          cp -r zh-tw/book public/zh-tw
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
      - id: deployment
        uses: actions/deploy-pages@v5
