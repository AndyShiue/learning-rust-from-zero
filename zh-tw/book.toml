[book]
title = "從零開始學 Rust"
authors = ["Andy Shiue"]
language = "zh-TW"

[rust]
edition = "2024"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/AndyShiue/learning-rust-from-zero"
edit-url-template = "https://github.com/AndyShiue/learning-rust-from-zero/edit/main/zh-tw/{path}"
site-url = "https://andyshiue.github.io/learning-rust-from-zero/zh-tw/"
additional-css = ["theme/code-fix.css"]

[output.html.playground]
editable = true

[output.html.print]
page-break = false
